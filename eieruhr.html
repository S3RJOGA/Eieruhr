</div>
<div class="w-full max-w-2xl flex flex-col items-center gap-16">
<!-- Central Timer Section -->
<section class="relative flex items-center justify-center">
<!-- Outer Progress Circle -->
<div class="w-80 h-80 md:w-[450px] md:h-[450px] rounded-full border-[12px] border-surface-container flex items-center justify-center relative sunlight-shadow">
<!-- Progress Overlay (SVG) -->
<svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="46" stroke="#e6dcc9" stroke-width="4"></circle>
<circle id="progress-circle" class="opacity-90" cx="50" cy="50" fill="none" r="46" stroke="url(#timerGradient)" stroke-dasharray="289.03" stroke-dashoffset="0" stroke-linecap="round" stroke-width="4"></circle>
<defs>
<linearGradient id="timerGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#8c4a00;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#fd8b00;stop-opacity:1"></stop>
</linearGradient>
</defs>
</svg>

<script>
    const CIRCUMFERENCE = 2 * Math.PI * 46; // 289.03

    let totalSeconds = 4 * 60;
    let remainingSeconds = totalSeconds;
    let timerInterval = null;
    let isRunning = false;

    function setPreset(minutes, btn) {
        resetTimer();
        totalSeconds = minutes * 60;
        remainingSeconds = totalSeconds;
        updateDisplay();

        document.querySelectorAll('.preset-btn').forEach(b => {
            b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'sunlight-shadow', 'active-preset');
            b.classList.add('bg-surface-variant', 'text-on-surface-variant');
        });
        btn.classList.remove('bg-surface-variant', 'text-on-surface-variant');
        btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'sunlight-shadow', 'active-preset');
    }

    function toggleTimer() {
        if (remainingSeconds <= 0) return;
        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-pause-btn').textContent = 'Start';
        } else {
            hideBanner();
            timerInterval = setInterval(tick, 1000);
            isRunning = true;
            document.getElementById('start-pause-btn').textContent = 'Pause';
        }
    }

    function tick() {
        if (remainingSeconds <= 0) {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-pause-btn').textContent = 'Start';
            showBanner();
            playAlarm();
            return;
        }
        remainingSeconds--;
        updateDisplay();
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        remainingSeconds = totalSeconds;
        document.getElementById('start-pause-btn').textContent = 'Start';
        hideBanner();
        updateDisplay();
    }

    function updateDisplay() {
        const mins = Math.floor(remainingSeconds / 60);
        const secs = remainingSeconds % 60;
        document.getElementById('timer-display').textContent =
            String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

        const progress = remainingSeconds / totalSeconds;
        const offset = CIRCUMFERENCE * (1 - progress);
        document.getElementById('progress-circle').style.strokeDashoffset = offset;
    }

    function showBanner() {
        document.getElementById('completion-banner').classList.remove('hidden');
    }

    function hideBanner() {
        document.getElementById('completion-banner').classList.add('hidden');
    }

    function playAlarm() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.3, 0.6, 0.9].forEach(delay => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
            osc.start(ctx.currentTime + delay);
            osc.stop(ctx.currentTime + delay + 0.25);
        });
    }

    // Initialisierung
    updateDisplay();
</script>
